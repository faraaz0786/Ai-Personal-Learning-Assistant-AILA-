name: AILA Enterprise CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        make install
        
    - name: Code Formatting (Black)
      run: |
        black --check .
        
    - name: Code Linting (Ruff)
      run: |
        ruff check .
        
    - name: Prompt Layout Validity Tests (Pytest)
      run: |
        pytest app/tests/ -v
