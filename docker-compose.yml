version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis

  frontend:
    image: node:20-alpine
    working_dir: /workspace/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    env_file:
      - frontend/.env.local
    volumes:
      - ./:/workspace
    ports:
      - "3000:3000"
    depends_on:
      - api
